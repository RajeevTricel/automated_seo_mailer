name: Daily PageSpeed Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"
      timezone: "Europe/Dublin"

concurrency:
  group: daily-pagespeed-report
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PageSpeed report
        run: npm run report
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EMAIL_BCC: ${{ secrets.EMAIL_BCC }}
          SUBJECT_PREFIX: ${{ vars.SUBJECT_PREFIX }}
          REPORT_STRATEGIES: ${{ vars.REPORT_STRATEGIES }}
          REQUEST_DELAY_MS: ${{ vars.REQUEST_DELAY_MS }}
          TIMEZONE: Europe/Dublin
          VERIFY_SMTP: "true"
          STRICT_MODE: "false"
