name: Daily PageSpeed Report

on:
  workflow_dispatch:
    inputs:
      send_email:
        description: "Send email after refresh"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "7 8 * * *"
      timezone: "Europe/Dublin"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-pagespeed-report
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Build report snapshot once
        run: npm run build-report
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          REPORT_STRATEGIES: ${{ vars.REPORT_STRATEGIES }}
          REQUEST_DELAY_MS: ${{ vars.REQUEST_DELAY_MS }}
          TIMEZONE: Europe/Dublin
          REPORT_TRIGGER_URL: ${{ vars.REPORT_TRIGGER_URL }}
          REPORT_REFRESH_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/daily-report.yml
          REPORT_ACCESS_CONTACT: mkdelivery@tricel.ie

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp report-preview.html site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send overview email from saved snapshot
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.send_email == 'true') }}
        run: npm run send-email
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          SUBJECT_PREFIX: ${{ vars.SUBJECT_PREFIX }}
          EMAIL_FROM_NAME: ${{ vars.EMAIL_FROM_NAME }}
          TIMEZONE: Europe/Dublin
          REPORT_URL: ${{ steps.deployment.outputs.page_url }}
          STRICT_MODE: "false"
