# .github/workflows/daily-report.yml
name: Daily PageSpeed Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Europe/Dublin"

concurrency:
  group: daily-pagespeed-report
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Generate report and send via EmailJS
        run: npm run report
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          REPORT_STRATEGIES: ${{ vars.REPORT_STRATEGIES }}
          REQUEST_DELAY_MS: ${{ vars.REQUEST_DELAY_MS }}
          SUBJECT_PREFIX: ${{ vars.SUBJECT_PREFIX }}
          EMAIL_FROM_NAME: ${{ vars.EMAIL_FROM_NAME }}
          TIMEZONE: Europe/Dublin
          STRICT_MODE: "false"
