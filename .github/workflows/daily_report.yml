# .github/workflows/daily-report.yml
name: Daily PageSpeed Demo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Europe/Dublin"

concurrency:
  group: daily-pagespeed-demo
  cancel-in-progress: false

jobs:
  dry-run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Generate report preview without sending email
        run: npm run dry-run
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          REPORT_STRATEGIES: ${{ vars.REPORT_STRATEGIES }}
          REQUEST_DELAY_MS: ${{ vars.REQUEST_DELAY_MS }}
          TIMEZONE: Europe/Dublin

      - name: Upload HTML preview
        uses: actions/upload-artifact@v4
        with:
          name: pagespeed-report-preview
          path: report-preview.html
          if-no-files-found: error
          retention-days: 7

      - name: Demo note
        run: echo "Report generation succeeded. Email sending intentionally skipped for demo."
